databases:
  - name: mentorhub-db
    databaseName: mentor_platform
    user: mentor_user
    plan: free

services:
  - type: web
    name: mentorhub-web
    env: node
    plan: free
    root: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mentorhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
