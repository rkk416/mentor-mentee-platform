<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#1e1b4b,#312e81);color:white;}
nav{display:flex;justify-content:space-between;padding:15px 30px;background:#0f172a;}
nav h2{margin:0;}
nav button{background:#ff758c;border:none;padding:8px 15px;border-radius:8px;color:white;cursor:pointer;}
.container{padding:20px;}
.stats{display:flex;gap:20px;}
.stat{flex:1;background:linear-gradient(135deg,#ff9a9e,#fad0c4);padding:15px;border-radius:12px;color:black;text-align:center;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.card{background:#1e293b;padding:20px;border-radius:15px;transition:0.3s;}
.card:hover{transform:translateY(-5px);}
.chart-box{height:200px;}
canvas{max-height:200px;}
.form-group{margin-bottom:15px;}
input,textarea,select{width:100%;padding:10px;border-radius:10px;border:none;margin-top:5px;}
.create-btn{width:100%;padding:12px;background:linear-gradient(135deg,#ff7eb3,#ff758c);border:none;border-radius:10px;cursor:pointer;color:white;font-size:14px;}
.item{background:#334155;padding:10px;border-radius:8px;margin-top:10px;}
.leader{background:#22c55e;padding:10px;border-radius:8px;margin-top:10px;display:flex;justify-content:space-between;color:black;}
.challenge-card{background:linear-gradient(135deg,#334155,#1e293b);padding:15px;border-radius:12px;margin-top:10px;transition:0.3s;}
.challenge-card:hover{transform:translateY(-4px);box-shadow:0 10px 20px rgba(0,0,0,0.3);}
.challenge-card h4{margin:0 0 5px;}
.challenge-card p{font-size:13px;color:#cbd5f5;}
.meta{display:flex;gap:15px;font-size:12px;margin-top:8px;color:#94a3b8;}
.submission-card{background:linear-gradient(135deg,#334155,#1e293b);padding:15px;border-radius:12px;margin-top:10px;}
.submission-card textarea{width:100%;margin-top:10px;padding:8px;border-radius:8px;border:none;}
.submission-card button{margin-top:10px;background:#22c55e;border:none;padding:8px;border-radius:8px;cursor:pointer;color:white;}
.green{color:#22c55e;}.orange{color:#f59e0b;}
.stars{margin-top:10px;}
.star{font-size:22px;cursor:pointer;opacity:0.4;transition:0.2s;}
.star:hover{transform:scale(1.2);}
.star.active{opacity:1;}
.loading{text-align:center;padding:20px;opacity:0.6;}
</style>
</head>
<body>

<nav>
  <h2>👨‍🏫 Mentor Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

<div class="stats">
  <div class="stat"><h3>Total Challenges</h3><p id="totalC">0</p></div>
  <div class="stat"><h3>Total Submissions</h3><p id="totalS">0</p></div>
</div>

<div class="grid">
  <div class="card">
    <h3>📅 Create Session</h3>
    <input id="sessionTitle" placeholder="Session Title (Week 1)">
    <textarea id="sessionDesc" placeholder="Session Description"></textarea>
    <button class="create-btn" onclick="createSession()">Create Session</button>
    <div id="sessions" style="margin-top:10px;"></div>
  </div>
  <div class="card">
    <h3>📊 Progress</h3>
    <div class="chart-box"><canvas id="myChart"></canvas></div>
  </div>
</div>

<div class="card"><h3>📈 Trends</h3><div class="chart-box"><canvas id="lineChart"></canvas></div></div>
<div class="card"><h3>📊 Performance</h3><div class="chart-box"><canvas id="barChart"></canvas></div></div>
<div class="card"><h3>🏆 Leaderboard</h3><div id="leaderboard"><div class="loading">Loading...</div></div></div>

</div>

<div class="card" style="margin-top:20px;">
  <h3>✨ Create Challenge</h3>
  <div class="form-group"><label>Title</label><input id="challengeTitle" placeholder="Enter challenge title"></div>
  <div class="form-group"><label>Description</label><textarea id="challengeDesc" placeholder="Explain the challenge clearly"></textarea></div>
  <div class="form-group"><label>Subject</label><input id="subject" placeholder="e.g. JavaScript, DSA"></div>
  <div class="form-group"><label>Difficulty</label>
    <select id="difficulty"><option value="">Select</option><option>Easy</option><option>Medium</option><option>Hard</option></select>
  </div>
  <div class="form-group"><label>Session</label><select id="sessionSelect"></select></div>
  <div class="form-group"><label>Deadline</label><input type="date" id="deadline"></div>
  <button class="create-btn" onclick="createChallenge()">🚀 Create</button>
</div>

<div class="card"><h3>Challenges</h3><div id="list"><div class="loading">Loading...</div></div></div>
<div class="card"><h3>Submissions</h3><div id="submissions"><div class="loading">Loading...</div></div></div>

</div>

<script>
// AUTH GUARD
const userData=JSON.parse(localStorage.getItem("user"));
if(!userData||!userData.user||userData.user.role!=="mentor"){window.location.href="index.html";}
const user=userData.user;
const token=userData.token;
function authHeaders(){return{"Content-Type":"application/json","Authorization":"Bearer "+token};}

let chart,lineChart,barChart;

function loadSessions(){
  fetch("/api/session").then(r=>r.json()).then(data=>{
    let opts='<option value="">Select Session</option>';
    data.forEach(s=>{opts+=`<option value="${s.id}">${s.title}</option>`;});
    document.getElementById("sessionSelect").innerHTML=opts;
  }).catch(e=>console.log("Session Error:",e));
}

function createSession(){
  const title=document.getElementById("sessionTitle").value;
  const description=document.getElementById("sessionDesc").value;
  if(!title){alert("Please enter session title");return;}
  fetch("/api/session",{method:"POST",headers:authHeaders(),body:JSON.stringify({title,description})})
  .then(r=>r.json()).then(()=>{
    alert("Session Created ✅");loadSessions();
    document.getElementById("sessionTitle").value="";
    document.getElementById("sessionDesc").value="";
  }).catch(()=>alert("Error creating session"));
}

function loadChallenges(){
  fetch("/api/challenge/all").then(r=>r.json()).then(data=>{
    document.getElementById("totalC").innerText=data.length;
    if(!data.length){document.getElementById("list").innerHTML="<p>No challenges yet</p>";return;}
    document.getElementById("list").innerHTML=data.map(c=>`
      <div class="challenge-card"><h4>${c.title}</h4><p>${c.description}</p>
        <div class="meta">
          <span>📅 ${c.session_title||"No Session"}</span>
          <span>📘 ${c.subject||"N/A"}</span>
          <span>⚡ ${c.difficulty||"N/A"}</span>
          <span>⏳ ${c.deadline||"No deadline"}</span>
        </div>
      </div>`).join("");
  }).catch(()=>{document.getElementById("list").innerHTML="<p>Error loading challenges</p>";});
}

function loadSubmissions(){
  fetch("/api/submission").then(r=>r.json()).then(data=>{
    document.getElementById("totalS").innerText=data.length;
    loadChart(data);loadLine(data);loadBar(data);
    if(!data.length){document.getElementById("submissions").innerHTML="<p>No submissions yet</p>";return;}
    document.getElementById("submissions").innerHTML=data.map(s=>{
      if (s.status === 'reviewed') {
        return `
          <div class="submission-card">
            <p><b>Challenge ID:</b> ${s.challenge_id}</p>
            <p><b>Answer:</b> ${s.answer}</p>
            <p><b>Status:</b> <span class="green">reviewed</span></p>
            <div style="background: #22c55e22; padding: 10px; border-radius: 8px; color: #22c55e; margin-top: 10px; cursor: pointer; text-align: center;" onclick="document.getElementById('fbView${s.id}').style.display = document.getElementById('fbView${s.id}').style.display === 'none' ? 'block' : 'none'">
              ✅ Feedback Sent (Click to view)
            </div>
            <div id="fbView${s.id}" style="display: none; background: #0f172a; padding: 10px; border-radius: 8px; margin-top: 10px;">
              <p style="margin: 0 0 5px;"><b>Comment:</b> ${s.comment || 'None'}</p>
              <p style="margin: 0;"><b>Rating:</b> ${s.score ? '⭐'.repeat(s.score) : 'Not rated'}</p>
            </div>
          </div>`;
      } else {
        return `
          <div class="submission-card">
            <p><b>Challenge ID:</b> ${s.challenge_id}</p>
            <p><b>Answer:</b> ${s.answer}</p>
            <p><b>Status:</b> <span class="orange">pending</span></p>
            <textarea id="fb${s.id}" placeholder="Write feedback..."></textarea>
            <div class="stars" id="stars${s.id}">
              ${[1,2,3,4,5].map(n=>`<span onclick="setRating(${s.id},${n})" onmouseover="hoverStars(${s.id},${n})" onmouseout="resetStars(${s.id})" class="star ${(s.score&&s.score>=n)?'active':''}" id="star${s.id}-${n}">⭐</span>`).join("")}
            </div>
            <button onclick="giveFeedback(${s.id})">Send Feedback</button>
          </div>`;
      }
    }).join("");
  }).catch(()=>{document.getElementById("submissions").innerHTML="<p>Error loading</p>";});
}

function giveFeedback(id){
  const comment=document.getElementById("fb"+id).value;
  const rating=ratings[id];
  if(!comment){alert("Write feedback first");return;}
  fetch("/api/feedback",{method:"POST",headers:authHeaders(),body:JSON.stringify({submission_id:id,comment,score:rating||null})})
  .then(r=>r.json()).then(()=>{alert("Feedback sent ✅");loadSubmissions();})
  .catch(()=>alert("Error sending feedback"));
}

const ratings={};
function setRating(id,value){
  ratings[id]=value;
  for(let i=1;i<=5;i++){const s=document.getElementById(`star${id}-${i}`);if(s){i<=value?s.classList.add("active"):s.classList.remove("active");}}
}

function loadChart(data){
  let r=0,p=0;data.forEach(s=>s.status==="reviewed"?r++:p++);
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById("myChart"),{type:'doughnut',data:{labels:["Reviewed","Pending"],datasets:[{data:[r,p],backgroundColor:["#22c55e","#f59e0b"]}]},options:{maintainAspectRatio:false}});
}

function loadLine(data){
  const map={};
  data.forEach(s=>{const d=s.created_at?new Date(s.created_at).toLocaleDateString():"Unknown";map[d]=(map[d]||0)+1;});
  if(lineChart)lineChart.destroy();
  lineChart=new Chart(document.getElementById("lineChart"),{type:'line',data:{labels:Object.keys(map),datasets:[{label:"Submissions",data:Object.values(map),borderColor:"#38bdf8",backgroundColor:"rgba(56,189,248,0.2)",fill:true,tension:0.4}]},options:{responsive:true,maintainAspectRatio:false}});
}

function loadBar(data){
  const map={};data.forEach(s=>{map[s.challenge_id]=(map[s.challenge_id]||0)+1;});
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{type:'bar',data:{labels:Object.keys(map),datasets:[{label:"Submissions per Challenge",data:Object.values(map),backgroundColor:["#22c55e","#f59e0b","#3b82f6","#ef4444","#a855f7"]}]},options:{responsive:true,maintainAspectRatio:false}});
}

function loadLeaderboard(){
  fetch("/api/progress").then(r=>r.json()).then(data=>{
    if(!data.length){document.getElementById("leaderboard").innerHTML="<p>No data yet</p>";return;}
    document.getElementById("leaderboard").innerHTML=data.map((u,i)=>`<div class="leader">Rank ${i+1}<span>${u.name||"Mentee #"+u.mentee_id}</span><span>${u.total_submissions} submissions</span></div>`).join("");
  }).catch(()=>{document.getElementById("leaderboard").innerHTML="<p>Error loading</p>";});
}

function createChallenge(){
  const session_id=document.getElementById("sessionSelect").value;
  if(!session_id){alert("Select session first");return;}
  const t=document.getElementById("challengeTitle").value;
  const d=document.getElementById("challengeDesc").value;
  if(!t||!d){alert("Please enter title and description");return;}
  fetch("/api/challenge/create",{method:"POST",headers:authHeaders(),body:JSON.stringify({mentor_id:user.id,title:t,description:d,subject:document.getElementById("subject").value,difficulty:document.getElementById("difficulty").value,deadline:document.getElementById("deadline").value,session_id})})
  .then(()=>{alert("Created ✅");loadChallenges();document.getElementById("challengeTitle").value="";document.getElementById("challengeDesc").value="";document.getElementById("subject").value="";document.getElementById("difficulty").value="";document.getElementById("deadline").value="";})
  .catch(()=>alert("Error creating challenge"));
}

function hoverStars(id,v){for(let i=1;i<=5;i++){document.getElementById(`star${id}-${i}`).classList.toggle("active",i<=v);}}
function resetStars(id){const s=ratings[id]||0;for(let i=1;i<=5;i++){document.getElementById(`star${id}-${i}`).classList.toggle("active",i<=s);}}
function logout(){localStorage.removeItem("user");window.location.href="index.html";}

window.onload=()=>{loadChallenges();loadSubmissions();loadLeaderboard();loadSessions();};
</script>
</body>
</html>
