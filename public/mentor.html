<!DOCTYPE html>
<html>
<head>
<title>Mentor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== BODY ===== */
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#1e1b4b,#312e81);
  color:white;
}

/* ===== NAV ===== */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#0f172a;
}

nav h2{
  margin:0;
}

nav button{
  background:#ff758c;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* ===== CONTAINER ===== */
.container{
  padding:20px;
}

/* ===== STATS ===== */
.stats{
  display:flex;
  gap:20px;
}

.stat{
  flex:1;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:15px;
  border-radius:12px;
  color:black;
  text-align:center;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:20px;
}

/* ===== CARD ===== */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* ===== CHART ===== */
.chart-box{
  height:200px;
}

canvas{
  max-height:200px !important;
}

/* ===== FORM ===== */
.form-group{
  margin-bottom:15px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:5px;
}

/* ===== BUTTON ===== */
.create-btn{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#ff7eb3,#ff758c);
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* ===== LIST ===== */
.item{
  background:#334155;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

/* ===== LEADER ===== */
.leader{
  background:#22c55e;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  color:black;
}
.challenge-card{
  background:linear-gradient(135deg,#334155,#1e293b);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  transition:0.3s;
}

.challenge-card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.challenge-card h4{
  margin:0 0 5px;
}

.challenge-card p{
  font-size:13px;
  color:#cbd5f5;
}

.meta{
  display:flex;
  gap:15px;
  font-size:12px;
  margin-top:8px;
  color:#94a3b8;
}
.submission-card{
  background:linear-gradient(135deg,#334155,#1e293b);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.submission-card textarea{
  width:100%;
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  border:none;
}

.submission-card button{
  margin-top:10px;
  background:#22c55e;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

.green{ color:#22c55e; }
.orange{ color:#f59e0b; }
.stars{
  margin-top:10px;
}

.star{
  font-size:22px;
  cursor:pointer;
  opacity:0.4;
  transition:0.2s;
}

.star:hover{
  transform:scale(1.2);
}

/* active stars */
.star.active{
  opacity:1;
}

</style>
</head>

<body>

<nav>
  <h2>👨‍🏫 Mentor Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">

<!-- STATS -->
<div class="stats">
  <div class="stat">
    <h3>Total Challenges</h3>
    <p id="totalC">0</p>
  </div>
  <div class="stat">
    <h3>Total Submissions</h3>
    <p id="totalS">0</p>
  </div>
</div>
<!-- GRID -->
<div class="grid">

  <!-- SESSION -->
  <div class="card">
    <h3>📅 Create Session</h3>

    <input id="sessionTitle" placeholder="Session Title (Week 1)">
    <textarea id="sessionDesc" placeholder="Session Description"></textarea>

    <button class="create-btn" onclick="createSession()">Create Session</button>

    <div id="sessions" style="margin-top:10px;"></div>
  </div>

  <!-- PROGRESS -->
  <div class="card">
    <h3>📊 Progress</h3>
    <div class="chart-box"><canvas id="myChart"></canvas></div>
  </div>

</div>
<div class="card">
  <h3>📈 Trends</h3>
  <div class="chart-box"><canvas id="lineChart"></canvas></div>
</div>

<div class="card">
  <h3>📊 Performance</h3>
  <div class="chart-box"><canvas id="barChart"></canvas></div>
</div>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard">Loading...</div>
</div>

</div>

<!-- CREATE -->
<div class="card" style="margin-top:20px;">
  <h3>✨ Create Challenge</h3>

  <div class="form-group">
    <label>Title</label>
    <input id="title" placeholder="Enter challenge title">
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea id="desc" placeholder="Explain the challenge clearly"></textarea>
  </div>

  <div class="form-group">
    <label>Subject</label>
    <input id="subject" placeholder="e.g. JavaScript, DSA">
  </div>

  <div class="form-group">
    <label>Difficulty</label>
    <select id="difficulty">
      <option value="">Select</option>
      <option>Easy</option>
      <option>Medium</option>
      <option>Hard</option>
    </select>
  </div>
  <div class="form-group">
  <label>Session</label>
  <select id="sessionSelect"></select>
</div>

  <div class="form-group">
    <label>Deadline</label>
    <input type="date" id="deadline">
  </div>

  <button class="create-btn" onclick="createChallenge()">🚀 Create</button>
</div>

<!-- CHALLENGES -->
<div class="card">
  <h3>Challenges</h3>
  <div id="list">Loading...</div>
</div>

<!-- SUBMISSIONS -->
<div class="card">
  <h3>Submissions</h3>
  <div id="submissions">Loading...</div>
</div>

</div>

<script>

let chart,lineChart,barChart;

/* LOAD CHALLENGES */
function loadSessions() {

  fetch("http://localhost:5000/api/session")
  .then(res => res.json())
  .then(data => {

    let options = '<option value="">Select Session</option>';

    data.forEach(s => {
      options += `<option value="${s.id}">${s.title}</option>`;
    });

    // ✅ FIXED ID HERE
    document.getElementById("sessionSelect").innerHTML = options;

  })
  .catch(err => console.log("Session Load Error:", err));
}
 //  createsession -----
function createSession(){

  const title = document.getElementById("sessionTitle").value;
  const description = document.getElementById("sessionDesc").value;

  fetch("http://localhost:5000/api/session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({title, description})
  })
  .then(res=>res.json())
  .then(()=>{
    alert("Session Created ✅");
    loadSessions();
  document.getElementById("sessionTitle").value="";
  document.getElementById("sessionDesc").value="";
  });
}

// loadchallenges----
function loadChallenges(){

 fetch("http://localhost:5000/api/challenge/all")
 .then(res=>res.json())
 .then(data=>{

   totalC.innerText = data.length;

   if(!data.length){
     list.innerHTML = "<p>No challenges yet</p>";
     return;
   }

   list.innerHTML = data.map(c=>`
     <div class="challenge-card">
       <h4>${c.title}</h4>
       <p>${c.description}</p>

       <div class="meta">
        <span>📅 ${c.session_title || "No Session"}</span>
        <span>📘 ${c.subject}</span>
        <span>⚡ ${c.difficulty}</span>
        <span>⏳ ${c.deadline}</span>
         
       </div>
     </div>
   `).join("");

 });
}
/* LOAD SUBMISSIONS */
function loadSubmissions(){

 fetch("http://localhost:5000/api/submission")
 .then(res=>res.json())
 .then(data=>{

   totalS.innerText = data.length;

   // ✅ ADD THIS (THIS WAS MISSING)
   loadChart(data);
   loadLine(data);
   loadBar(data);

   if(!data.length){
     submissions.innerHTML = "<p>No submissions yet </p>";
     return;
   }

  submissions.innerHTML = data.map(s=>`
  <div class="submission-card">

    <p><b>Challenge ID:</b> ${s.challenge_id}</p>
    <p><b>Answer:</b> ${s.answer}</p>

    <p>
      <b>Status:</b> 
      <span class="${s.status==='reviewed'?'green':'orange'}">
        ${s.status || "pending"}
      </span>
    </p>

    <textarea id="fb${s.id}" placeholder="Write feedback..."></textarea>

    <!-- ⭐ STAR RATING -->
    <div class="stars" id="stars${s.id}">
  ${[1,2,3,4,5].map(n=>`
    <span 
      onclick="setRating(${s.id}, ${n})"
      onmouseover="hoverStars(${s.id}, ${n})"
      onmouseout="resetStars(${s.id})"
      class="star ${(s.score && s.score >= n) ? 'active' : ''}" 
      id="star${s.id}-${n}">
      ⭐
    </span>
  `).join("")}
</div>

    <button onclick="giveFeedback(${s.id})">
      Send Feedback
    </button>

  </div>
`).join("");

 });
}
// feedback section---
function giveFeedback(id){

  const comment = document.getElementById("fb"+id).value;
  const rating = ratings[id]; // ⭐ from stars

  if(!comment){
    alert("Write feedback first");
    return;
  }

  fetch("http://localhost:5000/api/feedback", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      submission_id: id,
      comment: comment,
      score: rating || null
    })
  })
  .then(res => res.json())
  .then(() => {
    alert("Feedback sent ✅");
    loadSubmissions();
  })
  .catch(() => {
    alert("Error ❌");
  });
}
const ratings = {}; // store selected ratings

function setRating(id, value){

  // save selected rating
  ratings[id] = value;

  // loop through 5 stars
  for(let i = 1; i <= 5; i++){

    const star = document.getElementById(`star${id}-${i}`);

    if(star){
      if(i <= value){
        star.classList.add("active");
      } else {
        star.classList.remove("active");
      }
    }
  }
}


/* CHARTS */
function loadChart(data){
 let r=0,p=0;
 data.forEach(s=> s.status==="reviewed"?r++:p++);

 if(chart) chart.destroy();

 chart=new Chart(myChart,{
  type:'doughnut',
  data:{
   labels:["Reviewed","Pending"],
   datasets:[{data:[r,p],backgroundColor:["#22c55e","#f59e0b"]}]
  },
  options:{maintainAspectRatio:false}
 });
}
// loadLine---
function loadLine(data){

  const map = {};

  data.forEach(s => {
    const date = s.created_at 
  ? new Date(s.created_at).toLocaleDateString() 
  : "Unknown";

    map[date] = (map[date] || 0) + 1;
  });

  const labels = Object.keys(map);
  const values = Object.values(map);

  if(lineChart) lineChart.destroy();

  lineChart = new Chart(document.getElementById("lineChart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: "Submissions",
        data: values,
        borderColor: "#38bdf8",
        backgroundColor: "rgba(56,189,248,0.2)",
        fill: true,
        tension: 0.4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

}
//-performance(loadbar) chart---
function loadBar(data){

  const map = {};

  data.forEach(s => {
    map[s.challenge_id] = (map[s.challenge_id] || 0) + 1;
  });

  const labels = Object.keys(map);
  const values = Object.values(map);

  if(barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: "Submissions per Challenge",
        data: values,
        backgroundColor: [
          "#22c55e","#f59e0b","#3b82f6","#ef4444","#a855f7"
        ]
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

}
/* LEADERBOARD */
function loadLeaderboard(){
 fetch("http://localhost:5000/api/progress")
 .then(res=>res.json())
 .then(data=>{
  leaderboard.innerHTML=data.map((u,i)=>`
   <div class="leader">
     Rank ${i+1}
     <span>${u.name || u.mentee_id}</span>
     <span>${u.total_submissions}</span>
   </div>
  `).join("");
 });
}

/* CREATE */
function createChallenge(){

 const userData = JSON.parse(localStorage.getItem("user"));
 const user = userData.user;

 const session_id = document.getElementById("sessionSelect").value;

 if(!session_id){
   alert("Select session first");
   return;
 }

 fetch("http://localhost:5000/api/challenge/create",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    mentor_id:user.id,
    title:title.value,
    description:desc.value,
    subject:subject.value,
    difficulty:difficulty.value,
    deadline:deadline.value,
    session_id   // ✅ IMPORTANT
  })
 })
 .then(()=>{
   alert("Created ✅");
   loadChallenges();
 });
}
function hoverStars(id, value){
  for(let i=1;i<=5;i++){
    document.getElementById(`star${id}-${i}`).classList.toggle("active", i <= value);
  }
}

function resetStars(id){
  const saved = ratings[id] || 0;
  for(let i=1;i<=5;i++){
    document.getElementById(`star${id}-${i}`).classList.toggle("active", i <= saved);
  }
}
/* LOGOUT */
function logout(){
 localStorage.removeItem("user");
 window.location.href="index.html";
}

/* INIT */
window.onload=()=>{
 loadChallenges();
 loadSubmissions();
 loadLeaderboard();
 loadSessions();   // ✅ ADD THIS
};

</script>

</body>
</html>
