<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentee Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);color:white;}
nav{display:flex;justify-content:space-between;padding:15px 30px;background:rgba(0,0,0,0.3);}
#welcomeBox{margin:20px;padding:15px;background:rgba(255,255,255,0.9);color:black;border-radius:10px;text-align:center;display:none;}
.container{padding:20px;}
.stats{display:flex;gap:20px;margin-bottom:20px;}
.stat{flex:1;padding:15px;border-radius:12px;text-align:center;color:white;}
.stat:nth-child(1){background:#ff7a18;}
.stat:nth-child(2){background:#28a745;}
.stat:nth-child(3){background:#ff9800;}
.stat:nth-child(4){background:#17a2b8;}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;}
.card{padding:20px;border-radius:12px;color:black;}
.challenges-card{background:#e3f2fd;}
.history-card{background:#f3e5f5;}
.chart-card{background:rgba(255,255,255,0.8);}
.challenge{background:#f8fafc;padding:12px;border-radius:10px;margin-top:10px;}
textarea{width:100%;padding:10px;border-radius:8px;}
button{margin-top:10px;padding:10px;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;}
button:hover{background:#5a67d8;}
.badge{padding:3px 8px;border-radius:6px;font-size:12px;color:white;}
.pending{background:#f59e0b;}
.reviewed{background:#22c55e;}
.chart-box{width:100%;max-width:400px;height:250px;margin:auto;}
.stars{font-size:18px;letter-spacing:2px;color:#facc15;}
.loading{text-align:center;padding:20px;opacity:0.6;}
</style>
</head>
<body>
<nav>
  <h2>📘 Mentee Dashboard</h2>
  <button onclick="logout()">Logout</button>
</nav>
<div id="welcomeBox"></div>
<div class="container">
<div class="stats">
  <div class="stat"><h3>Total</h3><p id="totalS">0</p></div>
  <div class="stat"><h3>Reviewed</h3><p id="reviewed">0</p></div>
  <div class="stat"><h3>Pending</h3><p id="pending">0</p></div>
  <div class="stat"><h3>Progress</h3><p id="progress">0%</p></div>
</div>
<div class="card chart-card">
  <h3>📊 Your Progress</h3>
  <div class="chart-box"><canvas id="myChart"></canvas></div>
</div>
<div class="grid">
<div class="card challenges-card">
  <h3>📌 Challenges</h3>
  <div id="challenges"><div class="loading">Loading...</div></div>
</div>
<div class="card history-card">
  <h3>📜 History + Feedback</h3>
  <div id="history"><div class="loading">Loading...</div></div>
</div>
</div>
</div>
<script>
const userData = JSON.parse(localStorage.getItem("user"));
if(!userData || !userData.user || userData.user.role !== "mentee"){
  window.location.href="index.html";
}
const user = userData.user;
const token = userData.token;

function authHeaders(){
  return {"Content-Type":"application/json","Authorization":"Bearer "+token};
}

let chart;

function showWelcome(){
  const hour=new Date().getHours();
  let msg="Welcome";
  if(hour<12) msg="Good Morning";
  else if(hour<18) msg="Good Afternoon";
  else msg="Good Evening";
  const box=document.getElementById("welcomeBox");
  box.innerHTML=`👋 ${msg}, ${user.name}! 🚀`;
  box.style.display="block";
  setTimeout(()=>box.style.display="none",3000);
}

let submittedIds = new Set();

function loadChallenges(){
 fetch("/api/challenge/all")
 .then(res=>res.json())
 .then(data=>{
   let html="";
   data.forEach(c=>{
     if(submittedIds.has(c.id)){
       html+=`<div class="challenge">
         <h4>${c.title}</h4><p>${c.description}</p>
         <div style="background: #22c55e22; padding: 10px; border-radius: 8px; color: #22c55e; text-align: center; margin-top: 10px;">
            ✅ Submitted
         </div>
       </div>`;
     } else {
       html+=`<div class="challenge">
         <h4>${c.title}</h4><p>${c.description}</p>
         <textarea id="ans${c.id}" placeholder="Your solution"></textarea>
         <button onclick="submitTask(${c.id})">Submit</button>
       </div>`;
     }
   });
   document.getElementById("challenges").innerHTML=html||"<p>No challenges yet</p>";
 })
 .catch(()=>{document.getElementById("challenges").innerHTML="<p>Error loading</p>";});
}

function submitTask(id){
 const answer=document.getElementById("ans"+id).value;
 if(!answer){alert("Please write your answer");return;}
 fetch("/api/submission",{
  method:"POST",
  headers:authHeaders(),
  body:JSON.stringify({challenge_id:id,mentee_id:user.id,answer})
 })
 .then(async res=>{
   const data = await res.json();
   if (!res.ok) throw new Error(data.message || "Failed to submit");
   return data;
 })
 .then(()=>{
   alert("Submitted ✅");
   document.getElementById("ans"+id).value = ""; // Clear textarea
   loadHistory();
 })
 .catch(err=>alert("Error submitting: " + err.message));
}

function loadHistory(){
 fetch("/api/submission?mentee_id="+user.id)
 .then(res=>res.json())
 .then(data=>{
   let html="";
   let total=0,rev=0,pen=0;
   submittedIds.clear();
   data.forEach(s=>{
     submittedIds.add(s.challenge_id);
     total++;
     if(s.status==="reviewed") rev++; else pen++;
     let stars="";
     if(s.score){for(let i=1;i<=5;i++) stars+=i<=s.score?"⭐":"☆";}
     else stars="Not rated";
     html+=`<div class="challenge">
       <b>Challenge:</b> ${s.challenge_id}<br>
       <b>Answer:</b> ${s.answer}<br>
       <span class="badge ${s.status==="reviewed"?"reviewed":"pending"}">${s.status}</span>
       <p>💬 ${s.comment||"No feedback yet"}</p>
       <p class="stars">${stars}</p>
     </div>`;
   });
   document.getElementById("history").innerHTML=html||"<p>No submissions found</p>";
   document.getElementById("totalS").innerText=total;
   document.getElementById("reviewed").innerText=rev;
   document.getElementById("pending").innerText=pen;
   const prog=total?Math.round((rev/total)*100):0;
   document.getElementById("progress").innerText=prog+"%";
   loadChart(rev,pen);
   loadChallenges(); // Load challenges after history is processed
 })
 .catch(()=>{document.getElementById("history").innerHTML="<p>Error loading</p>";});
}

function loadChart(r,p){
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("myChart"),{
  type:'doughnut',
  data:{labels:['Reviewed','Pending'],datasets:[{data:[r,p],backgroundColor:["#22c55e","#f59e0b"]}]},
  options:{maintainAspectRatio:false}
 });
}

function logout(){
 localStorage.removeItem("user");
 window.location.href="index.html";
}

window.onload=()=>{
 showWelcome();
 loadHistory(); // This will now automatically call loadChallenges() afterwards
};
</script>
</body>
</html>
